version: '3.8'

services:
  backend-control:
    build:
      context: .
      dockerfile: Dockerfile.control
    container_name: backend-control
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
      # Exponer SPI si están disponibles
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"

  backend-automation:
    build:
      context: .
      dockerfile: Dockerfile.automation
    container_name: backend-automation
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"

  web-dashboard:
    image: nginx:alpine
    container_name: web-dashboard
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./web_dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
