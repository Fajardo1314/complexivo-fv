version: '3.8'

services:
  backend-control:
    build:
      context: .
      dockerfile: Dockerfile.control
    container_name: backend-control
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
      # Exponer SPI si están disponibles
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"

  backend-automation:
    build:
      context: .
      dockerfile: Dockerfile.automation
    container_name: backend-automation
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"

  web-dashboard:
    image: nginx:alpine
    container_name: web-dashboard
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./web_dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ─── Node-RED: Dashboard y automatización visual ───────────────────────────
  # Acceso: http://raspberryfv.netbird.cloud:1880       (editor)
  #         http://raspberryfv.netbird.cloud:1880/ui    (dashboard)
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: unless-stopped
    network_mode: host          # Comparte IP con la Pi → puede llamar a Flask en 127.0.0.1:5000
    user: root                  # Necesario para ejecutar comandos del sistema
    environment:
      - TZ=America/Guayaquil
    volumes:
      - ./nodered_data:/data    # Flujos, credenciales y módulos persistentes
