version: '3.8'

services:
  backend-control:
    build:
      context: .
      dockerfile: Dockerfile.control
    container_name: backend-control
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_CONTAINER=1
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
      # Exponer SPI si están disponibles
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
    ports:
      - "5000:5000"

  web-dashboard:
    image: nginx:alpine
    container_name: web-dashboard
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./web_dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ─── Mosquitto: Broker MQTT independiente ────────────────────────────────
  # Puerto estándar MQTT para sensores ESP32
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    environment:
      - TZ=America/Guayaquil
