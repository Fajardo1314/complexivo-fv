<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega - Smart Stock</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0907;
            --glass: rgba(30, 20, 12, 0.55);
            --border: rgba(180, 140, 90, 0.12);
            --primary: #c8956c;
            --accent: #d4a574;
            --text: #f5efe8;
            --muted: #a89480;
            --danger: #e05252;
            --success: #6db87a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #2a1a10 0%, #0d0907 90%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .sub {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .stock-big {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--primary);
            text-align: center;
            margin: 15px 0;
        }

        .stock-big small {
            font-size: 0.9rem;
            color: var(--muted);
            display: block;
            font-weight: 500;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .row .lbl {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .row .val {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 18px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-retiro {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: #fff;
        }

        .btn-devolucion {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: #fff;
        }

        .btn-retiro:disabled,
        .btn-devolucion:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            margin-top: 14px;
            font-size: 0.9rem;
        }

        .msg {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .msg-ok {
            background: rgba(109, 184, 122, 0.15);
            border: 1px solid rgba(109, 184, 122, 0.3);
            color: var(--success);
        }

        .msg-err {
            background: rgba(224, 82, 82, 0.15);
            border: 1px solid rgba(224, 82, 82, 0.3);
            color: var(--danger);
        }

        .badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            display: inline-block;
        }

        .badge-green {
            background: rgba(109, 184, 122, 0.15);
            color: var(--success);
            border: 1px solid rgba(109, 184, 122, 0.3);
        }

        .badge-red {
            background: rgba(224, 82, 82, 0.15);
            color: var(--danger);
            border: 1px solid rgba(224, 82, 82, 0.3);
        }

        .notfound {
            text-align: center;
            padding: 40px 0;
        }

        .notfound h2 {
            color: var(--danger);
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div id="loading" style="text-align:center;padding:40px 0;">
            <p style="color:var(--muted)">Cargando...</p>
        </div>

        <div id="productInfo" style="display:none">
            <h1 id="pNombre">—</h1>
            <p class="sub" id="pMarca">—</p>

            <div class="stock-big"><span id="pStock">0</span><small>unidades disponibles</small></div>

            <div class="row"><span class="lbl">Código Sistema</span><span class="val" id="pCodigo">—</span></div>
            <div class="row"><span class="lbl">Cód. Institucional</span><span class="val" id="pCodInst">—</span></div>
            <div class="row"><span class="lbl">Categoría</span><span class="val" id="pCategoria">—</span></div>
            <div class="row"><span class="lbl">Ubicación</span><span class="val" id="pUbicacion">—</span></div>
            <div class="row"><span class="lbl">Estado</span><span class="val" id="pEstado">—</span></div>
            <div class="row" id="pSpecsRow" style="display:none"><span class="lbl">Especificaciones</span><span
                    class="val" id="pSpecs">—</span></div>

            <div class="actions">
                <button class="btn btn-retiro" id="btnRetirar" onclick="retirar()">📦 Retirar (-1)</button>
                <button class="btn btn-devolucion" id="btnDevolver" onclick="devolver()">📥 Devolver (+1)</button>
            </div>

            <div class="msg msg-ok" id="msgOk"></div>
            <div class="msg msg-err" id="msgErr"></div>

            <button class="btn-back" onclick="window.location.href='/'">← Volver al Dashboard</button>
        </div>

        <div id="notFound" class="notfound" style="display:none">
            <h2>Producto no encontrado</h2>
            <p style="color:var(--muted)">El código QR no corresponde a ningún artículo.</p>
            <button class="btn-back" onclick="window.location.href='/'">← Volver</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://complexivo-fv-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        let prod = null;

        async function load() {
            if (!productId) { showNotFound(); return; }
            try {
                const snap = await get(ref(db, `inventario/${productId}`));
                if (!snap.exists()) { showNotFound(); return; }
                prod = snap.val();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('productInfo').style.display = 'block';
                render();
            } catch (e) {
                document.getElementById('loading').innerHTML = '<p style="color:var(--danger)">Error al cargar.</p>';
            }
        }

        function showNotFound() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('notFound').style.display = 'block';
        }

        function render() {
            document.getElementById('pNombre').textContent = prod.nombre || '—';
            document.getElementById('pMarca').textContent = prod.marca || '';
            document.getElementById('pCodigo').textContent = prod.codigo_sistema || productId;
            document.getElementById('pCodInst').textContent = prod.codigo_institucional || '—';
            document.getElementById('pCategoria').textContent = prod.categoria || '—';
            document.getElementById('pUbicacion').textContent = prod.ubicacion || '—';
            const estado = prod.estado || 'Funcional';
            document.getElementById('pEstado').innerHTML = estado === 'Funcional'
                ? '<span class="badge badge-green">Funcional</span>'
                : '<span class="badge badge-red">No Funcional</span>';
            updateStock(prod.stock || 0);

            // Mostrar especificaciones si existen
            const esp = prod.especificaciones;
            if (esp && (esp.procesador || esp.ram || esp.almacenamiento)) {
                document.getElementById('pSpecsRow').style.display = 'flex';
                let parts = [];
                if (esp.procesador) parts.push(esp.procesador);
                if (esp.ram) parts.push(esp.ram);
                if (esp.almacenamiento) parts.push(esp.almacenamiento);
                if (esp.componentes_adicionales) parts.push(esp.componentes_adicionales);
                document.getElementById('pSpecs').textContent = parts.join(' | ');
            }
        }

        function updateStock(n) {
            document.getElementById('pStock').textContent = n;
            document.getElementById('btnRetirar').disabled = (n <= 0);
        }

        function showMsg(type, text) {
            const el = document.getElementById(type === 'ok' ? 'msgOk' : 'msgErr');
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        window.retirar = async function () {
            if (!prod) return;
            const stock = prod.stock || 0;
            if (stock <= 0) { showMsg('err', 'Sin stock disponible.'); return; }
            const nuevo = stock - 1;
            try {
                await update(ref(db, `inventario/${productId}`), { stock: nuevo });
                await push(ref(db, 'retiros'), {
                    producto_id: productId, nombre_producto: prod.nombre,
                    cantidad_retirada: 1, stock_anterior: stock, stock_nuevo: nuevo,
                    usuario: 'Móvil QR', fecha: new Date().toLocaleString('es-ES')
                });
                prod.stock = nuevo;
                updateStock(nuevo);
                showMsg('ok', `✅ Retirado. Stock: ${nuevo}`);
            } catch (e) { showMsg('err', 'Error al retirar.'); }
        };

        window.devolver = async function () {
            if (!prod) return;
            const stock = prod.stock || 0;
            const nuevo = stock + 1;
            try {
                await update(ref(db, `inventario/${productId}`), { stock: nuevo });
                await push(ref(db, 'retiros'), {
                    producto_id: productId, nombre_producto: prod.nombre,
                    cantidad_retirada: -1, stock_anterior: stock, stock_nuevo: nuevo,
                    usuario: 'Móvil QR (devolución)', fecha: new Date().toLocaleString('es-ES')
                });
                prod.stock = nuevo;
                updateStock(nuevo);
                showMsg('ok', `✅ Devuelto. Stock: ${nuevo}`);
            } catch (e) { showMsg('err', 'Error al devolver.'); }
        };

        load();
    </script>
</body>

</html>
