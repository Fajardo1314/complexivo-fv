<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega - Smart Stock (Claro)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #fafaf8;
            --glass: rgba(255, 255, 255, 0.92);
            --border: rgba(0, 0, 0, 0.10);
            --primary: #111111;
            --accent: #444444;
            --text: #0f0f0f;
            --muted: #6b6b6b;
            --danger: #c0392b;
            --success: #27ae60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #fafaf8;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at 10% 20%, #ffffff 0%, #f5f3ef 100%);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 4px;
            color: var(--primary);
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .sub {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .stock-big {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--primary);
            text-align: center;
            margin: 15px 0;
        }

        .stock-big small {
            font-size: 0.9rem;
            color: var(--muted);
            display: block;
            font-weight: 500;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .row .lbl {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .row .val {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 18px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-retiro {
            background: #c0392b;
            color: #fff;
        }

        .btn-devolucion {
            background: #27ae60;
            color: #fff;
        }

        .btn-retiro:disabled,
        .btn-devolucion:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            margin-top: 14px;
            font-size: 0.9rem;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #111111;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        .msg {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .msg-ok {
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid rgba(39, 174, 96, 0.2);
            color: var(--success);
        }

        .msg-err {
            background: rgba(192, 57, 43, 0.1);
            border: 1px solid rgba(192, 57, 43, 0.2);
            color: var(--danger);
        }

        .badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            display: inline-block;
        }

        .badge-green {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
            border: 1px solid rgba(39, 174, 96, 0.2);
        }

        .badge-orange {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-red {
            background: rgba(192, 57, 43, 0.1);
            color: var(--danger);
            border: 1px solid rgba(192, 57, 43, 0.2);
        }

        .notfound {
            text-align: center;
            padding: 40px 0;
        }

        .notfound h2 {
            color: var(--danger);
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            background: white;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .user-badge {
            font-size: 0.75rem;
            color: var(--muted);
            text-align: right;
            margin-bottom: 8px;
        }

        .user-badge strong {
            color: var(--success);
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(43, 29, 18, 0.4);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(139, 94, 60, 0.2);
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- LOADING -->
        <div id="loading" style="text-align:center;padding:40px 0;">
            <p style="color:var(--muted)">Cargando...</p>
        </div>

        <!-- PRODUCTO (visible para todos) -->
        <div id="productInfo" style="display:none">
            <div id="sessionBadge" class="user-badge" style="display:none;">Sesión: <strong id="sessionUser">—</strong>
            </div>

            <h1 id="pNombre">—</h1>
            <p class="sub" id="pCarrera">—</p>

            <div class="stock-big"><span id="pStock">0</span><small>unidades disponibles</small></div>

            <div class="row"><span class="lbl">Código Sistema</span><span class="val" id="pCodigo">—</span></div>
            <div class="row"><span class="lbl">Carrera</span><span class="val" id="pCarreraRow">—</span></div>
            <div class="row"><span class="lbl">Categoría</span><span class="val" id="pCategoria">—</span></div>
            <div class="row"><span class="lbl">Ubicación</span><span class="val" id="pUbicacion">—</span></div>
            <div class="row"><span class="lbl">Estado</span><span class="val" id="pEstado">—</span></div>
            <div class="row"><span class="lbl">Descripción</span><span class="val" id="pDescripcion">—</span></div>

            <div class="actions">
                <button class="btn btn-retiro" id="btnRetirar">Retirar (-1)</button>
                <button class="btn btn-devolucion" id="btnDevolver">Devolver (+1)</button>
            </div>

            <div class="msg msg-ok" id="msgOk"></div>
            <div class="msg msg-err" id="msgErr"></div>

            <button class="btn-back" id="btnLogout" style="display:none;margin-top:8px;">Cerrar Sesión</button>
            <button class="btn-back" onclick="window.location.href='/'">Volver al Dashboard</button>
        </div>

        <!-- NO ENCONTRADO -->
        <div id="notFound" class="notfound" style="display:none">
            <h2>Producto no encontrado</h2>
            <p style="color:var(--muted)">El código QR no corresponde a ningún artículo.</p>
            <button class="btn-back" onclick="window.location.href='/'">Volver</button>
        </div>
    </div>

    <!-- MODAL LOGIN (aparece al hacer clic en Retirar/Devolver) -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <h2>Iniciar Sesión</h2>
            <p style="color:var(--muted);font-size:0.85rem;margin-bottom:15px;">Debe autenticarse para retirar o devolver productos</p>
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="Ingrese su usuario">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" placeholder="Ingrese su contraseña">
            </div>
            <button class="btn-login" id="btnLogin">Iniciar Sesión</button>
            <div class="msg msg-err" id="loginErr"></div>
            <button class="btn-back" id="btnCancelLogin" style="margin-top:8px;">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://complexivo-fv-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        let prod = null;
        let usuarioActivo = null;
        let pendingAction = null; // 'retirar' o 'devolver'

        // --- CARGAR PRODUCTO (sin login) ---
        async function load() {
            if (!productId) { showNotFound(); return; }
            try {
                const snap = await get(ref(db, `inventario/${productId}`));
                if (!snap.exists()) { showNotFound(); return; }
                prod = snap.val();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('productInfo').style.display = 'block';
                render();
            } catch (e) {
                document.getElementById('loading').innerHTML = '<p style="color:var(--danger)">Error al cargar.</p>';
            }
        }

        function showNotFound() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('notFound').style.display = 'block';
        }

        function render() {
            document.getElementById('pNombre').textContent = prod.nombre_producto || prod.nombre || '—';
            document.getElementById('pCarrera').textContent = prod.carrera || '';
            document.getElementById('pCodigo').textContent = productId;
            document.getElementById('pCarreraRow').textContent = prod.carrera || '—';
            document.getElementById('pCategoria').textContent = prod.categoria || '—';
            document.getElementById('pUbicacion').textContent = prod.ubicacion || '—';
            document.getElementById('pDescripcion').textContent = prod.descripcion || '—';
            const estado = prod.estado || 'Funcional';
            document.getElementById('pEstado').innerHTML = estado === 'Funcional'
                ? '<span class="badge badge-green">Funcional</span>'
                : estado === 'Regular'
                ? '<span class="badge badge-orange">Regular</span>'
                : '<span class="badge badge-red">No Funcional</span>';
            updateStock(prod.stock || 0);
        }

        function updateStock(n) {
            document.getElementById('pStock').textContent = n;
            document.getElementById('btnRetirar').disabled = (n <= 0);
        }

        function showMsg(type, text) {
            const el = document.getElementById(type === 'ok' ? 'msgOk' : 'msgErr');
            el.textContent = text;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        // --- LOGIN MODAL ---
        function showLoginModal(action) {
            pendingAction = action;
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginErr').style.display = 'none';
            document.getElementById('loginUser').focus();
        }

        function hideLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            pendingAction = null;
        }

        document.getElementById('btnCancelLogin').addEventListener('click', hideLoginModal);

        // Cerrar modal al hacer clic fuera
        document.getElementById('loginModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('loginModal')) hideLoginModal();
        });

        // Enter en password
        document.getElementById('loginPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('btnLogin').click();
        });

        // --- LOGIN ---
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const errEl = document.getElementById('loginErr');

            if (!user || !pass) {
                errEl.textContent = 'Ingrese usuario y contraseña.';
                errEl.style.display = 'block';
                return;
            }

            errEl.style.display = 'none';
            document.getElementById('btnLogin').textContent = 'Verificando...';
            document.getElementById('btnLogin').disabled = true;

            try {
                const snapshot = await get(ref(db, 'usuarios_sistema'));
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    for (const key of Object.keys(users)) {
                        const u = users[key];
                        if (!u || !u.usuario) continue;
                        if (u.usuario === user && u.passwordWeb === pass) {
                            usuarioActivo = u;
                            break;
                        }
                    }
                }
            } catch (e) {
                errEl.textContent = 'Error de conexión.';
                errEl.style.display = 'block';
            }

            document.getElementById('btnLogin').textContent = 'Iniciar Sesión';
            document.getElementById('btnLogin').disabled = false;

            if (usuarioActivo) {
                // Login exitoso
                hideLoginModal();
                document.getElementById('sessionBadge').style.display = 'block';
                document.getElementById('sessionUser').textContent = usuarioActivo.usuario;
                document.getElementById('btnLogout').style.display = 'block';

                // Ejecutar acción pendiente
                if (pendingAction === 'retirar') {
                    doRetirar();
                } else if (pendingAction === 'devolver') {
                    doDevolver();
                }
            } else {
                errEl.textContent = 'Credenciales incorrectas.';
                errEl.style.display = 'block';
            }
        });

        // --- LOGOUT ---
        document.getElementById('btnLogout').addEventListener('click', () => {
            usuarioActivo = null;
            document.getElementById('sessionBadge').style.display = 'none';
            document.getElementById('btnLogout').style.display = 'none';
            showMsg('ok', 'Sesión cerrada.');
        });

        // --- BOTONES RETIRAR/DEVOLVER ---
        document.getElementById('btnRetirar').addEventListener('click', () => {
            if (!prod) return;
            if (prod.stock <= 0) { showMsg('err', 'Sin stock disponible.'); return; }
            if (!usuarioActivo) {
                showLoginModal('retirar');
            } else {
                doRetirar();
            }
        });

        document.getElementById('btnDevolver').addEventListener('click', () => {
            if (!prod) return;
            if (!usuarioActivo) {
                showLoginModal('devolver');
            } else {
                doDevolver();
            }
        });

        // --- EJECUTAR RETIRO ---
        async function doRetirar() {
            const stock = prod.stock || 0;
            if (stock <= 0) { showMsg('err', 'Sin stock disponible.'); return; }
            const nuevo = stock - 1;
            try {
                await update(ref(db, `inventario/${productId}`), { stock: nuevo });
                await push(ref(db, 'retiros'), {
                    producto_id: productId,
                    nombre_producto: prod.nombre_producto || prod.nombre,
                    cantidad_retirada: 1,
                    stock_anterior: stock,
                    stock_nuevo: nuevo,
                    usuario: usuarioActivo.usuario,
                    fecha: new Date().toLocaleString('es-ES')
                });
                prod.stock = nuevo;
                updateStock(nuevo);
                showMsg('ok', `Retirado por ${usuarioActivo.usuario}. Stock: ${nuevo}`);
            } catch (e) { showMsg('err', 'Error al retirar.'); }
        }

        // --- EJECUTAR DEVOLUCION ---
        async function doDevolver() {
            const stock = prod.stock || 0;
            const nuevo = stock + 1;
            try {
                await update(ref(db, `inventario/${productId}`), { stock: nuevo });
                await push(ref(db, 'retiros'), {
                    producto_id: productId,
                    nombre_producto: prod.nombre_producto || prod.nombre,
                    cantidad_retirada: -1,
                    stock_anterior: stock,
                    stock_nuevo: nuevo,
                    usuario: usuarioActivo.usuario,
                    fecha: new Date().toLocaleString('es-ES')
                });
                prod.stock = nuevo;
                updateStock(nuevo);
                showMsg('ok', `Devuelto por ${usuarioActivo.usuario}. Stock: ${nuevo}`);
            } catch (e) { showMsg('err', 'Error al devolver.'); }
        }

        // Cargar producto inmediatamente
        load();
    </script>
</body>

</html>
