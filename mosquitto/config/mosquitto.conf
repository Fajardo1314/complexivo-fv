# Mosquitto MQTT Broker Configuration
# Configurado para arquitectura de microservicios con Docker

# Listener en el puerto estándar MQTT
listener 1883

# Permitir conexiones anónimas (sensores ESP32 sin autenticación)
allow_anonymous true

# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_type all
